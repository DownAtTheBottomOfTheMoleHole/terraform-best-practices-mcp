repos:
  # YAML and JSON validation
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: detect-private-key

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlintrc.json]

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args:
          [--config-data, "{extends: default, rules: {line-length: disable}}"]

  # JavaScript/TypeScript linting via Node (eslint installed locally)
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: npm run lint --
        language: system
        files: \.(ts|tsx)$
        require_serial: false
        stages: [pre-commit]

  # TypeScript type checking
  - repo: local
    hooks:
      - id: typescript-check
        name: typescript
        entry: npm run check
        language: system
        files: \.(ts|tsx)$
        pass_filenames: false
        stages: [pre-commit]

# Global settings
default_language_version:
  node: 24.0.0

ci:
  autofix_commit_msg: "chore: auto-format with pre-commit"
  autofix_prs: true
  autoupdate_branch: ""
  autoupdate_commit_msg: "chore: pre-commit autoupdate"
  autoupdate_schedule: weekly
  skip: []
  submodules: false
