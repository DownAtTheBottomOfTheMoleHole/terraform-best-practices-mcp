# yaml-language-server: $schema=https://gitversion.net/schemas/6.0/GitVersion.configuration.json
workflow: GitHubFlow/v1

mode: ContinuousDelivery
next-version: 1.0.0
tag-prefix: "[vV]?"

major-version-bump-message: '\+semver:\s?(breaking|major)'
minor-version-bump-message: '\+semver:\s?(feature|minor)'
patch-version-bump-message: '\+semver:\s?(fix|patch)'
no-bump-message: '\+semver:\s?(none|skip)'

strategies:
  - TaggedCommit
  - MergeMessage
  - VersionInBranchName
  - TrackReleaseBranches
  - ConfiguredNextVersion
  - Mainline
  - Fallback

branches:
  main:
    regex: ^main$
    label: ""
    increment: Patch
    is-main-branch: true
    prevent-increment:
      when-current-commit-tagged: true

  feature:
    regex: ^(?:feature|feat|bugfix|fix|chore|docs|refactor|test|perf)[/-](?<BranchName>.+)
    label: "{BranchName}"
    increment: Inherit
    source-branches:
      - main
      - release
      - hotfix
      - support

  release:
    regex: ^release[/-](?<BranchName>.+)
    label: rc
    increment: Minor
    is-release-branch: true
    source-branches:
      - main

  hotfix:
    regex: ^hotfix[/-](?<BranchName>.+)
    label: hotfix
    increment: Patch
    source-branches:
      - main
      - support

  support:
    regex: ^support[/-](?<BranchName>.+)
    label: support
    increment: Patch
    is-release-branch: true
    source-branches:
      - main

  pull-request:
    regex: ^(?:pull|pr)[/-](?<Number>\d+)
    label: "pr.{Number}"
    increment: Inherit
    source-branches:
      - main
      - feature
      - release
      - hotfix
      - support

  unknown:
    regex: (?<BranchName>.+)
    label: "{BranchName}"
    increment: Inherit

ignore:
  sha: []
