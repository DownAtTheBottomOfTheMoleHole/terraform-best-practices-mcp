changelog:
  categories:
    - title: ":boom: Breaking Changes"
      labels:
        - breaking-change
    - title: ":sparkles: Features"
      labels:
        - feature
    - title: ":bug: Bug Fixes"
      labels:
        - bug
        - hotfix
    - title: ":memo: Documentation"
      labels:
        - documentation
    - title: ":wrench: Maintenance"
      labels:
        - maintenance
  exclude:
    labels:
      - duplicate
      - invalid
      - wontfix
