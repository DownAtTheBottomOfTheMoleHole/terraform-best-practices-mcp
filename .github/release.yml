changelog:
  categories:
    - title: ":boom: Breaking Changes"
      labels:
        - breaking-change
    - title: ":sparkles: Features"
      labels:
        - feature
    - title: ":bug: Bug Fixes"
      labels:
        - bug
        - hotfix
    - title: ":technologist: Developer Experience"
      labels:
        - ci
        - test
    - title: ":memo: Documentation"
      labels:
        - documentation
    - title: ":wrench: Maintenance"
      labels:
        - maintenance
        - refactor
        - style
  exclude:
    labels:
      - duplicate
      - invalid
      - wontfix
      - ignore-for-release
