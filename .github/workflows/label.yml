name: Label PR

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  label:
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    name: Auto-label PR
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6
        with:
          configuration-path: .github/labeler.yml
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  renovate-label:
    runs-on: ubuntu-latest
    name: Label Renovate PR
    if: github.actor == 'renovate[bot]' && github.event.pull_request.head.repo.fork == false
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const labels = ['Renovate', 'maintenance'];
            const title = (context.payload.pull_request?.title || '').toLowerCase();

            if (title.includes('major') || title.includes('major version')) {
              labels.push('Semver Major');
            } else if (title.includes('minor') || title.includes('minor version')) {
              labels.push('Semver Minor');
            } else {
              labels.push('Semver Patch');
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels,
            });
