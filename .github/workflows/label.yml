name: Label PR

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  label:
    runs-on: ubuntu-latest
    name: Auto-label PR
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5
        with:
          configuration-path: .github/labeler.yml
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  renovate-label:
    runs-on: ubuntu-latest
    name: Label Renovate PR
    if: github.actor == 'renovate[bot]'
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const labels = ['Renovate', 'maintenance'];
            const title = (context.payload.pull_request?.title || '').toLowerCase();

            if (title.includes('major') || title.includes('major version')) {
              labels.push('Semver Major');
            } else if (title.includes('minor') || title.includes('minor version')) {
              labels.push('Semver Minor');
            } else {
              labels.push('Semver Patch');
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels,
            });
