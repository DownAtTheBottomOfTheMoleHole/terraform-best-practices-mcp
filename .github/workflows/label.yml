name: Label PR

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    name: Auto-label PR
    steps:
      - uses: actions/labeler@9b3fc10c57b356dcf6e5b5d63cdc52f3bd88e11a # v5
        with:
          configuration-path: .github/labeler.yml
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  renovate-label:
    runs-on: ubuntu-latest
    name: Label Renovate PR
    if: github.actor == 'renovate[bot]'
    steps:
      - uses: actions/github-script@60a0ed5c524312ce9b056f268c37e3d5c8dd0d4b # v7
        with:
          script: |
            const labelsToApply = ['Renovate', 'maintenance'];

            // Ensure all labels exist before applying them
            for (const label of labelsToApply) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                });
              } catch (e) {
                if ((e.status ?? e.response?.status) === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label,
                    color: 'ededed',
                  });
                }
              }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labelsToApply,
            });
