name: Label PR

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  label:
    runs-on: ubuntu-latest
    name: Auto-label PR
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@9b3fc10c57b356dcf6e5b5d63cdc52f3bd88e11a # v5
        with:
          configuration-path: .github/labeler.yml
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  renovate-label:
    runs-on: ubuntu-latest
    name: Label Renovate PR
    if: github.actor == 'renovate[bot]'
    permissions:
      pull-requests: write
      issues: write
    steps:
      - uses: actions/github-script@60a0ed5c524312ce9b056f268c37e3d5c8dd0d4b # v7
        with:
          script: |
            const labels = ['Renovate', 'maintenance'];

            // Parse PR title to determine semantic version label
            const title = context.payload.pull_request.title.toLowerCase();
            if (title.includes('major') || title.includes('major version')) {
              labels.push('Semver Major');
            } else if (title.includes('minor') || title.includes('minor version')) {
              labels.push('Semver Minor');
            } else {
              // Default to patch for dependency updates
              labels.push('Semver Patch');
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labels,
            });
