# Label PRs automatically based on changed files
# Mapped to release.yml changelog categories for better release notes

# Breaking Changes
breaking-change:
  - changed-files:
      - any-glob-to-any-file: ["src/index.ts", "src/lib/**/*.ts"]

# Features
Enhancement:
  - changed-files:
      - any-glob-to-any-file: ["src/tools/**/*.ts"]

feature:
  - changed-files:
      - any-glob-to-any-file:
          - "src/**/*.ts"
          - "!src/tools/**/*.ts"
          - "!src/lib/**/*.ts"
          - "!src/index.ts"

# Bug Fixes
Bug:
  - changed-files:
      - any-glob-to-any-file: ["tests/**/*.ts"]

# Documentation
Documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - "docs/**"

# (Alias `docs` is handled in release.yml; no separate auto-label configuration needed here.)

# Maintenance & Dependencies
maintenance:
  - changed-files:
      - any-glob-to-any-file:
          - "package.json"
          - "tsconfig.json"
          - ".eslintrc.json"
          - ".prettier*"
          - ".gitignore"
          - ".gitattributes"
          - ".gitmodules"
          - "renovate.json"
          - ".github/workflows/**"
          - ".mega-linter.yml"
          - "cspell.json"

