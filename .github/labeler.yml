# yaml-language-server: $schema=https://www.schemastore.org/pull-request-labeler-5.json
# Labels PRs based on file paths, branch names, and title patterns
# Mapped to release.yml changelog categories

breaking-change:
  - head-branch:
      - pattern: ".*breaking.*"
  - title:
      - pattern: ".*!:.*"

feature:
  - title:
      - pattern: '^feat(\(.+\))?:'
  - head-branch:
      - pattern: "feature/.*"

bug:
  - title:
      - pattern: '^fix(\(.+\))?:'
  - head-branch:
      - pattern: "fix/.*"

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - "docs/**"
          - ".github/ISSUE_TEMPLATE/**"
          - ".github/pull_request_template.md"

maintenance:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/workflows/**"
          - ".github/labeler.yml"
          - ".mega-linter.yml"
          - "tests/**/*.ts"
          - "**/*.test.ts"
          - "**/*.spec.ts"
          - "vitest.config.ts"
          - "package.json"
          - "package-lock.json"
          - "tsconfig*.json"
          - ".eslintrc.json"
          - ".prettier*"
          - ".gitignore"
          - ".gitattributes"
          - "renovate.json"
          - "cspell.json"
          - "GitVersion.yml"
